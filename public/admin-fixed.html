<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - RareIDs</title>
  <style>
    body { margin:0; font-family:system-ui, sans-serif; background:#070707; color:#fff; }
    main { max-width:1120px; margin:0 auto; padding:24px; }
    h1 { font-size:2rem; margin-bottom:0.75rem; }
    .panel { display:flex; gap:16px; flex-wrap:wrap; margin-bottom:24px; }
    .card { background:#111; border:1px solid #222; border-radius:16px; padding:18px; flex:1 1 220px; }
    .card h2 { margin:0 0 10px; font-size:1rem; color:#ccc; }
    .card p { font-size:2rem; margin:0; }
    button { cursor:pointer; border:none; border-radius:12px; padding:12px 18px; background:#0e8ef8; color:#fff; font-weight:700; }
    button[disabled] { opacity:.45; cursor:not-allowed; }
    .form-row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:18px; }
    .form-row input { background:#111; border:1px solid #333; color:#fff; padding:12px 14px; border-radius:12px; min-width:200px; }
    .table-wrapper { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; margin-top:12px; }
    th, td { padding:12px 14px; text-align:left; border-bottom:1px solid #222; font-size:.95rem; }
    th { color:#aaa; font-weight:700; }
    td { color:#eee; }
    .status-AVAILABLE { color:#57d47b; }
    .status-SOLD { color:#f4c150; }
    .status-ARCHIVED { color:#888; }
    .error { color:#ff5a5a; margin-top:12px; }
  </style>
</head>
<body>
  <main>
    <h1>Admin Dashboard</h1>
    <div class="form-row">
      <input id="admin-email" type="text" placeholder="Admin email" autocomplete="username" />
      <input id="admin-password" type="password" placeholder="Password" autocomplete="current-password" />
      <button id="login-btn">Login</button>
      <button id="logout-btn" style="display:none;background:#ff5a5a">Logout</button>
    </div>
    <div id="admin-status" class="error"></div>
    <div class="panel">
      <div class="card"><h2>Total users</h2><p id="total-users">—</p></div>
      <div class="card"><h2>Total products</h2><p id="total-products">—</p></div>
      <div class="card"><h2>Available</h2><p id="total-available">—</p></div>
      <div class="card"><h2>Sold</h2><p id="total-sold">—</p></div>
    </div>
    <section>
      <h2>FF ID Listings</h2>
      <h2 style="margin-top:24px">Manage User Balance</h2>
<div class="form-row" id="balance-form" style="display:none">
  <select id="select-user" style="background:#111;border:1px solid #333;color:#fff;padding:12px 14px;border-radius:12px;min-width:200px;">
    <option value="">Pilih User</option>
  </select>
  <input id="input-amount" type="number" placeholder="Amount (USD)" />
  <button id="add-balance-btn">Add Balance</button>
  <div id="balance-status" class="error"></div>
</div>
      <div class="form-row" id="add-product-form" style="display:none">
        <input id="input-ffid" type="text" placeholder="FF ID" />
        <input id="input-price" type="number" placeholder="Price (USD)" />
        <select id="input-category" style="background:#111;border:1px solid #333;color:#fff;padding:12px 14px;border-radius:12px;min-width:200px;">
          <option value="">Pilih Server</option>
          <option value="ID">🇮🇩 Indonesia (ID)</option>
          <option value="SG">🇸🇬 Singapore/Malaysia (SG)</option>
          <option value="NA">🌎 North America (NA)</option>
          <option value="EU">🌍 Europe (EU)</option>
        </select>
        <input id="input-uid" name="uid" type="text" placeholder="UID akun" />
        <input id="input-password" type="text" placeholder="Password akun" />
        <select id="input-status" style="background:#111;border:1px solid #333;color:#fff;padding:12px 14px;border-radius:12px;">
          <option value="AVAILABLE">AVAILABLE</option>
          <option value="SOLD">SOLD</option>
          <option value="ARCHIVED">ARCHIVED</option>
        </select>
        <button id="add-product-btn">Tambah Produk</button>
        <div id="product-status" class="error"></div>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>FF ID</th>
              <th>Price</th>
              <th>Category</th>
              <th>Status</th>
              <th>Created</th>
              <th style="text-align:right">Action</th>
            </tr>
          </thead>
          <tbody id="listings-body"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="config.js"></script>
  <script>
    // Gunakan BACKEND_URL dari config.js (ubah di config.js saja)
    const API = BACKEND_URL + '/api';
    const loginBtn = document.getElementById('login-btn')
    const logoutBtn = document.getElementById('logout-btn')
    const statusEl = document.getElementById('admin-status')
    const tokenKey = 'rareids_admin_token'
    const state = { token: localStorage.getItem(tokenKey) || '' }

    function authHeaders() {
      return { 'Content-Type': 'application/json', ...(state.token ? { Authorization: 'Bearer ' + state.token } : {}) }
    }

    async function api(path, options = {}) {
      const res = await fetch(API + path, {
        headers: authHeaders(),
        ...options
      })
      return res.json()
    }

    function showError(msg) {
      statusEl.textContent = msg || ''
    }

    async function loadSummary() {
      const res = await api('/admin/summary')
      if (!res.success) throw new Error(res.error || 'Failed to load summary')
      document.getElementById('total-users').textContent = res.data.users
      document.getElementById('total-products').textContent = res.data.products
      document.getElementById('total-available').textContent = res.data.available
      document.getElementById('total-sold').textContent = res.data.sold
    }

    async function loadListings() {
      const res = await api('/admin/listings')
      if (!res.success) throw new Error(res.error || 'Failed to load listings')
      const body = document.getElementById('listings-body')
      body.innerHTML = res.data.map(item => `
        <tr data-id="${item.id}">
          <td>${item.id}</td>
          <td>${item.ff_id || '-'}</td>
          <td>${item.price != null ? item.price : '-'}</td>
          <td>${item.category || '-'}</td>
          <td class="status-${item.status || 'UNKNOWN'}">${item.status || '-'}</td>
          <td>${item.created_at ? new Date(item.created_at).toLocaleString() : '-'}</td>
          <td style="text-align:right">
            <button class="delete-btn" data-id="${item.id}" title="Hapus" style="background:#ff4d4d;padding:6px 10px;border-radius:10px;font-weight:800;font-size:12px;">Hapus</button>
          </td>
        </tr>`).join('')

      // Bind delete actions for newly rendered rows
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.preventDefault()
          const id = btn.getAttribute('data-id')
          if (!id) return
          if (!confirm('Yakin hapus listing #' + id + '?')) return

          btn.disabled = true
          const prev = btn.textContent
          btn.textContent = '...'

          try {
            const delRes = await fetch(API + '/admin/listings/' + id, {
              method: 'DELETE',
              headers: { Authorization: 'Bearer ' + state.token }
            })
            const delData = await delRes.json()
            if (!delData.success) throw new Error(delData.error || 'Gagal menghapus')
            await loadListings()
            await loadSummary()
          } catch (err) {
            showError(err.message)
          } finally {
            btn.disabled = false
            btn.textContent = prev
          }
        })
      })
    }


    async function tryLoadAdmin() {
      if (!state.token) return
      try {
        await Promise.all([loadSummary(), loadListings()])
        logoutBtn.style.display = 'inline-flex'
        loginBtn.style.display = 'none'
        showError('')
        document.getElementById('add-product-form').style.display = 'flex' 
        document.getElementById('balance-form').style.display = 'flex'
          await loadUsers() // ← tambah ini
      } catch (err) {
        state.token = ''
        localStorage.removeItem(tokenKey)
        logoutBtn.style.display = 'none'
        loginBtn.style.display = 'inline-flex'
        showError(err.message)
      }
    }
    logoutBtn.addEventListener('click', () => {
      state.token = ''
      localStorage.removeItem(tokenKey)
      logoutBtn.style.display = 'none'
      loginBtn.style.display = 'inline-flex'
      showError('Logged out')
      document.getElementById('add-product-form').style.display = 'none'
      document.getElementById('listings-body').innerHTML = ''
      document.getElementById('total-users').textContent = '-'
      document.getElementById('balance-form').style.display = 'none'
      document.getElementById('total-products').textContent = '-'
      document.getElementById('total-available').textContent = '-'
      document.getElementById('total-sold').textContent = '-'
    })

    document.getElementById('add-product-btn').addEventListener('click', async () => {
      const ff_id = document.getElementById('input-ffid').value.trim()
      const price = document.getElementById('input-price').value
      const category = document.getElementById('input-category').value.trim()
      const status = document.getElementById('input-status').value
      const productStatus = document.getElementById('product-status')

      if (!ff_id || !price) {
        productStatus.textContent = 'FF ID dan price wajib diisi!'
        return
      }

      const uid = document.getElementById('input-uid').value.trim()
      const password = document.getElementById('input-password').value.trim()

      const res = await fetch(API + '/admin/products', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + state.token },
        body: JSON.stringify({ ff_id, price, category, status, uid, password })
      })

      const data = await res.json()
      if (!data.success) {
        productStatus.textContent = data.error
        return
      }

      productStatus.style.color = '#57d47b'
      productStatus.textContent = 'Produk berhasil ditambahkan!'
      document.getElementById('input-ffid').value = ''
      document.getElementById('input-price').value = ''
      document.getElementById('input-category').value = ''
      await loadListings()
      await loadSummary()
    })

    loginBtn.addEventListener('click', async () => {
  try {
    showError('Logging in...')

    // ✅ Ambil nilai dari input
    const email = document.getElementById('admin-email').value
    const password = document.getElementById('admin-password').value

    if (!email || !password) {
      showError('Email dan password harus diisi')
      return
    }

    // ✅ Satu fetch saja, pakai action: 'login' sesuai backend
    const res = await fetch(API + '/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'login', email, password })
    })

    const data = await res.json()
    if (!data.success) throw new Error(data.error || 'Login gagal')

    // ✅ Backend return { success: true, data: { token } }
    state.token = data.data.token
    localStorage.setItem(tokenKey, data.data.token)
    await tryLoadAdmin()

  } catch (err) {
    showError(err.message)
  }
})
async function loadUsers() {
  const res = await fetch(API + '/admin/users', {
    headers: { Authorization: 'Bearer ' + state.token }
  })
  const data = await res.json()
  if (!data.success) return
  const select = document.getElementById('select-user')
  select.innerHTML = '<option value="">Pilih User</option>'
  data.data.forEach(u => {
   select.innerHTML += `<option value="${u.id}">${u.full_name} (${u.email}) - $${u.balance}</option>`
  })
}
  document.getElementById('input-uid').value = ''
  document.getElementById('input-password').value = ''

document.getElementById('add-balance-btn').addEventListener('click', async () => {
  const user_id = document.getElementById('select-user').value
  const amount = document.getElementById('input-amount').value
  const balanceStatus = document.getElementById('balance-status')

  if (!user_id || !amount) {
    balanceStatus.textContent = 'Pilih user dan masukkan amount!'
    return
  }

  const res = await fetch(API + '/admin/add-balance', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + state.token },
    body: JSON.stringify({ user_id, amount: parseFloat(amount) })
  })

  const data = await res.json()
  if (!data.success) {
    balanceStatus.textContent = data.error
    return
  }

  balanceStatus.style.color = '#57d47b'
  balanceStatus.textContent = 'Balance berhasil ditambahkan!'
  document.getElementById('input-amount').value = ''
  await loadUsers()
})
    tryLoadAdmin()
  </script>
</body>
</html>
